{% extends 'shop/base.html' %}

{% block content %}
<div class="auth-page container py-4">
    <div class="auth-card card border-0 shadow-sm mx-auto">
        <div class="card-body p-4 p-md-5">
        <h1 class="text-center">НОВЫЙ ПАРОЛЬ</h1>
        <p class="auth-subtitle">Введите новый пароль для вашего аккаунта</p>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="auth-row">
                <label class="form-label mb-1">Новый пароль</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="auth-row">
                <label class="form-label mb-1">Подтверждение пароля</label>
                <input class="form-control" type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            {% include 'shop/components/button.html' with button_type='submit' text='Сохранить новый пароль' %}
        </form>
        <p class="auth-login"><a href="{% url 'login' %}">← Вернуться к входу</a></p>
        </div>
    </div>
</div>
{% endblock %}
