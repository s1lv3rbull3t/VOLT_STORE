{% extends 'shop/base.html' %}

{% block content %}
<div class="auth-page container py-4">
    <div class="auth-card card border-0 shadow-sm mx-auto">
        <div class="card-body p-4 p-md-5">
        <h1 class="text-center">ВХОД</h1>
        <p class="auth-subtitle">Введите данные для входа в аккаунт</p>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {% if next_url %}
                <input type="hidden" name="next" value="{{ next_url }}">
            {% endif %}
            <div class="auth-row">
                <label class="form-label mb-1">Email</label>
                <input class="form-control" type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="auth-row">
                <label class="form-label mb-1">Пароль</label>
                <div class="password-field">
                    <input class="form-control" id="login-password" type="password" name="password" placeholder="••••••••" required>
                    <button type="button" id="toggle-login-password" class="password-toggle" aria-label="Показать пароль">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="auth-link-row">
                <a href="{% url 'restore' %}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}">Забыли пароль?</a>
            </div>
            {% include 'shop/components/button.html' with button_type='submit' text='Войти' %}
        </form>
        <p class="auth-login">Нет аккаунта? <a href="{% url 'register' %}{% if next_url %}?next={{ next_url|urlencode }}{% endif %}">Регистрация</a></p>
        </div>
    </div>
</div>
<script>
    (function () {
        const passwordInput = document.getElementById('login-password');
        const toggleButton = document.getElementById('toggle-login-password');
        if (!passwordInput || !toggleButton) return;
        toggleButton.addEventListener('click', function () {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            toggleButton.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
        });
    })();
</script>
{% endblock %}
